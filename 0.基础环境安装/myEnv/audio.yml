name: audio
channels:
  - conda-forge
dependencies:
  - python=3.10
  - ffmpeg
  - numpy
  - pandas
  - pip
  - pip:
      - --pre
      - --extra-index-url https://download.pytorch.org/whl/nightly/cu128
      - torch
      - torchaudio
      - torchvision
      - transformers==4.41.2
      - librosa
      - soundfile
      - openai-whisper
      - pyttsx3
      - gradio
      - protobuf
      - huggingface_hub
